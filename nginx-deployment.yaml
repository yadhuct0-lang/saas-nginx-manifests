apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-nginx-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-saas
  template:
    metadata:
      labels:
        app: nginx-saas
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx-saas
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
